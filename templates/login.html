<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | Sistema Parroquial</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
    background:#111827;
        color:white;
            font-family:Arial, sans-serif;
                display:flex;
                    justify-content:center;
                        align-items:center;
                            height:100vh;
                                margin:0;
                                }

                                .card{
                                    background:#1f2937;
                                        padding:40px;
                                            border-radius:20px;
                                                width:340px;
                                                    box-shadow:0 10px 30px rgba(0,0,0,0.4);
                                                        border:1px solid #374151;
                                                        }

                                                        h1{
                                                            margin-bottom:25px;
                                                                text-align:center;
                                                                    font-size:28px;
                                                                    }

                                                                    .subtitle{
                                                                        text-align:center;
                                                                            color:#9ca3af;
                                                                                margin-bottom:25px;
                                                                                    font-size:14px;
                                                                                    }

                                                                                    input{
                                                                                        width:100%;
                                                                                            padding:14px;
                                                                                                margin-bottom:16px;
                                                                                                    border:none;
                                                                                                        border-radius:12px;
                                                                                                            background:#374151;
                                                                                                                color:white;
                                                                                                                    font-size:15px;
                                                                                                                        box-sizing:border-box;
                                                                                                                        }

                                                                                                                        input:focus{
                                                                                                                            outline:none;
                                                                                                                                box-shadow:0 0 0 2px #2563eb;
                                                                                                                                }

                                                                                                                                button{
                                                                                                                                    width:100%;
                                                                                                                                        padding:14px;
                                                                                                                                            border:none;
                                                                                                                                                border-radius:12px;
                                                                                                                                                    background:#2563eb;
                                                                                                                                                        color:white;
                                                                                                                                                            font-weight:bold;
                                                                                                                                                                cursor:pointer;
                                                                                                                                                                    font-size:15px;
                                                                                                                                                                        transition:0.2s;
                                                                                                                                                                        }

                                                                                                                                                                        button:hover{
                                                                                                                                                                            background:#1d4ed8;
                                                                                                                                                                            }

                                                                                                                                                                            .error{
                                                                                                                                                                                color:#f87171;
                                                                                                                                                                                    text-align:center;
                                                                                                                                                                                        margin-bottom:16px;
                                                                                                                                                                                            background:#7f1d1d33;
                                                                                                                                                                                                padding:10px;
                                                                                                                                                                                                    border-radius:10px;
                                                                                                                                                                                                        border:1px solid #dc2626;
                                                                                                                                                                                                        }

                                                                                                                                                                                                        .footer{
                                                                                                                                                                                                            text-align:center;
                                                                                                                                                                                                                margin-top:20px;
                                                                                                                                                                                                                    color:#6b7280;
                                                                                                                                                                                                                        font-size:12px;
                                                                                                                                                                                                                        }

                                                                                                                                                                                                                        </style>

                                                                                                                                                                                                                        </head>

                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                        <div class="card">

                                                                                                                                                                                                                        <h1>🔐 Sistema Parroquial</h1>

                                                                                                                                                                                                                        <div class="subtitle">
                                                                                                                                                                                                                        Acceso administrativo
                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                        {% if error %}
                                                                                                                                                                                                                        <div class="error">
                                                                                                                                                                                                                        {{ error }}
                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                        {% endif %}

                                                                                                                                                                                                                        <form method="POST">

                                                                                                                                                                                                                        <input
                                                                                                                                                                                                                        type="text"
                                                                                                                                                                                                                        name="username"
                                                                                                                                                                                                                        placeholder="Usuario"
                                                                                                                                                                                                                        required>

                                                                                                                                                                                                                        <input
                                                                                                                                                                                                                        type="password"
                                                                                                                                                                                                                        name="password"
                                                                                                                                                                                                                        placeholder="Contraseña"
                                                                                                                                                                                                                        required>

                                                                                                                                                                                                                        <button type="submit">
                                                                                                                                                                                                                        Ingresar
                                                                                                                                                                                                                        </button>

                                                                                                                                                                                                                        </form>

                                                                                                                                                                                                                        <div class="footer">
                                                                                                                                                                                                                        Parroquia-Web • Flask + SQLite
                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                        </html>
